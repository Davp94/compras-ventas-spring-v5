server:
    port: 9500
spring: 
    application:
        name: compras-ventas
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:5432/compras_ventas_v5
        username: postgres
        password: 123456
    jpa:
        hibernate:
            ddl-auto: create-drop
        show-sql: true   
logging:
    file: 
        name: logs/compras-ventas.log
        logback:
        rollingpolicy:
            file-name-pattern: logs/compras-ventas-%d{yyyy-MM-dd}.log
            max-history: 30
            max-file-size: 10MB
            total-size-cap: 1GB
    level:
        root: INFO
        com.blumbit.compras_ventas: DEBUG
        org.springframework.web: WARN
        org.hibernate: WARN
application:
    jwt:
        secret-key: mysecretkey
        access-token-expiration: 90000 # 15 minutes en milisegundos
        refresh-token-expiration: 604800000 # 7 días en milisegundos
        

         

